kind = "mobile"
previewPath = "/"
title = "Pawzee"
version = "1.0.0"
id = "artifacts/pawzee"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
localPort = 21035
name = "expo"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/pawzee run dev"

[services.env]
PORT = "21035"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/pawzee", "run", "build"]
run = ["pnpm", "--filter", "@workspace/pawzee", "run", "serve"]
